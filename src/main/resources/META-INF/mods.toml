modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
# Server-side mod — client'ta yuklu olmasa da baglanti engellenmez
displayTest="IGNORE_SERVER_VERSION"
description='''${mod_description}'''

# Forge bagimliligi
[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

# Minecraft bagimliligi
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Immersive Aircraft — opsiyonel bagimlilik (soft dependency)
[[dependencies.${mod_id}]]
    modId="immersive_aircraft"
    mandatory=false
    versionRange="[0.5.0,)"
    ordering="AFTER"
    side="BOTH"
